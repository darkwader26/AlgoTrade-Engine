# Trading bot default configuration
symbols:
  - BTC/USD
  - ETH/USD
timeframes:
  - 1m
  - 5m
  - 1h
initial_capital: 100000.0
commission: 0.001
slippage: 0.0005
position_sizing: fixed
max_position_size: 10000.0
stop_loss_pct: 0.02
take_profit_pct: 0.05
max_drawdown_pct: 0.2
use_paper_trading: true
