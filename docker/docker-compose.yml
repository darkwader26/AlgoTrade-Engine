# =============================================================================
#  AlgoTrade Engine — Docker Compose Orchestration
# =============================================================================
#  Services:
#    trading-bot   — The algorithmic trading engine (built from Dockerfile)
#    prometheus    — Metrics collection and monitoring
#    grafana       — Metrics visualization dashboard
# =============================================================================

version: "3.9"

services:
  trading-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: algotrade-engine
    restart: unless-stopped
    volumes:
      - ../config.yaml:/app/config.yaml:ro
    environment:
      # Exchange API keys (override with real values for live trading)
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY:-paper_key_demo}
      - EXCHANGE_API_SECRET=${EXCHANGE_API_SECRET:-paper_secret_demo}
      - EXCHANGE_PASSPHRASE=${EXCHANGE_PASSPHRASE:-}
      # Trading mode
      - PAPER_TRADING=${PAPER_TRADING:-true}
      # Metrics endpoint
      - METRICS_PORT=${METRICS_PORT:-9090}
    ports:
      - "${METRICS_PORT:-9090}:9090"

  prometheus:
    image: prom/prometheus:latest
    container_name: algotrade-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: algotrade-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=

volumes:
  prometheus_data:
  grafana_data:
